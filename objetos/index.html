<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEX - GESTIÓN DE OBJETOS</title>
    <link rel="icon" type="image/png" href="../img/icon.png"> 
    <link rel="stylesheet" href="../styleobjetos.css?v=5.0"> 
</head>
<body>
    <div class="container-hex">
        <div style="text-align: left; margin-bottom: 10px;"><a href="../index.html" style="color: #d4af37; text-decoration: none; font-size: 0.8em;">⬅ Volver al Inicio</a></div>
        <h1>SISTEMA DE OBJETOS</h1>
        <nav>
            <button onclick="window.mostrarPagina('grilla')">Inventarios</button>
            <button onclick="window.mostrarPagina('catalogo')">Catálogo</button>
            <button id="btn-sync" onclick="window.toggleSync()" style="background:#004a00; font-weight: bold; border-color:#0f0; color:#fff;">CONECTADO (AUTO)</button>
            <button onclick="window.ejecutarSyncLog()" style="background:#2e004f; border-style: dashed;">Acceso OP</button>
            <button onclick="window.toggleLibre()" style="background:#b8860b; color:#000; font-weight:bold; border-color:#fff;">Modo Libre 🧲</button>
        </nav>
        
        <section id="pag-grilla" class="pagina"><div id="contenedor-grilla"></div></section>
        <section id="pag-inventario" class="pagina"><div id="contenedor-jugadores"></div></section>
        <section id="pag-catalogo" class="pagina"><div id="tabla-todos-objetos"></div></section>
        <section id="pag-op-menu" class="pagina"><div id="menu-op-central"></div></section>
        <section id="pag-control" class="pagina"><div id="panel-interactivo"></div></section>
        <section id="pag-crear" class="pagina"><div id="panel-creacion"></div></section>
        <section id="pag-party" class="pagina"><div id="panel-party-loot"></div></section>
        <section id="pag-transfer" class="pagina"><div id="panel-transferencia"></div></section>
        
        <input type="file" id="input-log" style="display:none">
    </div>
    
    <div id="contenedor-libre" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.85); z-index:9000; overflow:hidden;">
        <button onclick="window.toggleLibre()" style="position:absolute; top:20px; right:20px; background:#ff0000; color:white; z-index:9999; font-size:1.2em;">SALIR DEL MODO LIBRE</button>
        <h2 style="position:absolute; top:20px; left:20px; color:#aaa; pointer-events:none; opacity:0.5;">Arrastra y agita rápido a un personaje para soltar su loot</h2>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script type="module" src="obj-main.js?v=6.0"></script>
    <script type="module" src="libre.js?v=1.0"></script>
</body>
</html>
