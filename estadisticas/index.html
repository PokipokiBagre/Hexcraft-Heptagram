<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/png" href="../img/icon.png"> 
    <link rel="stylesheet" href="../stylestats.css?v=1.1">

<body>
    <div class="nav-bar" style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--gold-dim); padding-bottom: 15px; margin-bottom: 20px;">

            <button onclick="window.location.href='../index.html'" style="background: #111; border-color: #555;">⬅ Volver al Inicio</button>
            <button onclick="window.mostrarCatalogo()">Volver al Catálogo</button>

        <h2 style="margin: 0;">FICHA DE ESTADO HEX</h2>
        <button onclick="window.abrirMenuOP()" style="border-style: dashed;">Acceso OP</button>

        </div>
