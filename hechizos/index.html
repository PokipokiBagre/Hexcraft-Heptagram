<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario de Hechizos</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        body { background-color: #05000a; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #d4af37; margin-top: 0; font-family: serif; }
        
        .top-bar { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 20px; }
        select { background: #111; color: #d4af37; border: 1px solid #555; padding: 10px 20px; font-size: 1.1em; border-radius: 4px; cursor: pointer; }
        
        .grid-inventario { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        
        .spell-card { background: #111; border: 1px solid #333; border-radius: 6px; padding: 15px; display: flex; flex-direction: column; }
        .spell-card h3 { margin: 0 0 10px 0; color: #fff; border-bottom: 1px solid #222; padding-bottom: 5px; font-size: 1.2em; font-family: serif; }
        
        .spell-tags { margin-bottom: 15px; }
        .spell-tag { display: inline-block; padding: 3px 8px; border-radius: 3px; font-size: 0.8em; font-weight: bold; margin-right: 5px; margin-bottom: 5px; background: #000; border: 1px solid #444;}
        .tag-hex { color: #d4af37; border-color: #d4af37; }
        .tag-tipo { color: #00ffff; border-color: #00ffff; }
        
        .spell-desc { font-size: 0.9em; color: #ccc; line-height: 1.4; background: #1a1a1a; padding: 10px; border-radius: 4px; border-left: 3px solid #555; margin-bottom: 10px; }
        .spell-efecto { font-size: 0.85em; color: #ff4444; margin-bottom: 5px; font-weight: bold; }
        .spell-extra { font-size: 0.8em; color: #aaa; margin-bottom: 5px; }
        
        .tag-origen { color: #888; font-style: italic; margin-top: auto; font-size: 0.8em; text-align: right; padding-top: 10px; border-top: 1px dashed #333;}
        
        .loading { text-align: center; color: #aaa; font-size: 1.2em; grid-column: 1 / -1; }
    </style>
</head>
<body>

    <h1>Inventario de Hechizos</h1>

    <div class="top-bar">
        <label style="color: #aaa; font-size: 1.1em;">Personaje:</label>
        <select id="selector-personaje" disabled>
            <option value="">Obteniendo data...</option>
        </select>
    </div>

    <div id="grid-inventario" class="grid-inventario">
        <div class="loading" id="loader">Obteniendo data de la base de datos...</div>
    </div>

    <script type="module" src="inventario-main.js"></script>
</body>
</html>
