<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Hechizos | HEX RPG</title>
    <link rel="stylesheet" href="../stylehechizos.css">
</head>
<body>

    <div class="container-hex">
        <div class="nav-bar">
            <div>
                <button class="btn-nav" onclick="window.location.href='../index.html'">⬅ Volver al Inicio</button>
                <button class="btn-nav" style="border-color:#00ff00; color:#00ff00;" disabled id="estado-conexion">🟢 CONECTADO</button>
            </div>
            <button class="btn-nav btn-op" onclick="window.abrirMenuOP()">⚙️ Acceso OP</button>
        </div>

        <h1 id="main-title">Directorio de Grimorios</h1>
        <div id="loader" class="loading">Sincronizando Hechizos y Personajes...</div>

        <div id="c-catalogo" class="vista-seccion oculto">
            <div class="filter-group">
                <button onclick="window.setFiltro('rol', 'Todos')" id="btn-rol-Todos" class="btn-active">Todos</button>
                <button onclick="window.setFiltro('rol', 'Jugador')" id="btn-rol-Jugador">Jugadores</button>
                <button onclick="window.setFiltro('rol', 'NPC')" id="btn-rol-NPC">NPCs</button>
            </div>
            <div class="filter-group">
                <button onclick="window.setFiltro('act', 'Todos')" id="btn-act-Todos" class="btn-active">Ambos</button>
                <button onclick="window.setFiltro('act', 'Activo')" id="btn-act-Activo">Vivos / Activos</button>
                <button onclick="window.setFiltro('act', 'Inactivo')" id="btn-act-Inactivo">Muertos / Inactivos</button>
            </div>
            <div id="vista-catalogo"></div>
        </div>

        <div id="c-grimorio" class="vista-seccion oculto">
            <div id="vista-grimorio"></div>
        </div>

        <div id="c-aprendizaje" class="vista-seccion oculto">
            <div id="vista-aprendizaje"></div>
        </div>

        <div id="c-gestion" class="vista-seccion oculto">
            <div id="vista-gestion"></div>
        </div>

    </div>

    <button id="btn-sync-global" class="btn-sync-float oculto" onclick="window.ejecutarSincronizacion()"></button>

    <script type="module" src="inventario-main.js"></script>
</body>
</html>
