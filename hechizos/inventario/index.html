<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario de Hechizos | HEX RPG</title>
    <link rel="stylesheet" href="../../stylehechizos/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Estilos rápidos específicos para el inventario, luego los puedes pasar a tu style.css */
        body { background-color: #05000a; color: #fff; font-family: 'Cinzel', serif; margin: 0; padding: 20px; }
        .top-bar { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 30px; border-bottom: 1px dashed #d4af37; padding-bottom: 20px; }
        select { background: #111; color: #d4af37; border: 1px solid #d4af37; padding: 10px 20px; font-family: 'Cinzel', serif; font-size: 1.2em; border-radius: 5px; cursor: pointer; }
        .grid-inventario { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        
        /* Tarjetas de hechizo */
        .spell-card { background: #1a0033; border: 1px solid #4a90e2; border-radius: 8px; padding: 15px; position: relative; transition: 0.3s; }
        .spell-card:hover { box-shadow: 0 0 15px rgba(74, 144, 226, 0.4); transform: translateY(-2px); }
        .spell-card h3 { margin: 0 0 10px 0; color: #fff; border-bottom: 1px solid #333; padding-bottom: 5px; font-size: 1.2em;}
        .spell-tag { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 0.8em; font-weight: bold; margin-right: 5px; margin-bottom: 10px; background: #000; border: 1px solid #555;}
        
        .tag-hex { color: #d4af37; border-color: #d4af37; }
        .tag-tipo { color: #00ffff; border-color: #00ffff; }
        .tag-origen { color: #aaa; font-style: italic; }
        
        .spell-desc { font-family: sans-serif; font-size: 0.9em; color: #ccc; line-height: 1.4; background: #0a0014; padding: 10px; border-radius: 4px; margin-top: 10px; }
        .spell-efecto { font-family: sans-serif; font-size: 0.85em; color: #ff4444; margin-top: 10px; font-weight: bold; }
        
        .loading { text-align: center; color: #d4af37; font-size: 1.5em; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>

    <h1 style="text-align: center; color: #d4af37; margin-top: 0;">Grimorio de Personajes</h1>

    <div class="top-bar">
        <label style="color: #aaa; font-size: 1.2em;">Seleccionar Personaje:</label>
        <select id="selector-personaje" disabled>
            <option value="">Cargando grimorio...</option>
        </select>
    </div>

    <div id="grid-inventario" class="grid-inventario">
        <div class="loading" id="loader">Canalizando energías desde la base de datos...</div>
    </div>

    <script type="module" src="inventario.js"></script>
</body>
</html>
