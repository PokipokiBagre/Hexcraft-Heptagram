<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>HEXCRAFT HEPTAGRAM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container-hex">
        <h1>HEX - OBJETOS</h1>
        <nav>
            <button onclick="mostrarPagina('inventarios')">Inventarios</button>
            <button onclick="mostrarPagina('catalogo')">Catálogo</button>

        <section id="pag-control" class="pagina" style="display:none;"><div id="panel-interactivo"></div></section>

    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script type="module" src="main.js"></script>

</html>
